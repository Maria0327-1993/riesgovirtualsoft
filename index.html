<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>RiskOps | Portal Operativo</title>
    <link rel="stylesheet" href="styles.css?v=69">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class='bx bx-shield-quarter' style="font-size: 2rem; color: #3B82F6;"></i>
                <span class="brand-name">Risk<span style="color: #3B82F6;">Ops</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navWorkspace"><i class='bx bx-grid-alt'></i> Workspace</a>
                <a href="#" class="nav-item" id="navTurno"><i class='bx bx-calendar'></i> Mi Turno</a>
                <a href="#" class="nav-item" id="navDocs"><i class='bx bx-folder'></i> Documentación</a>
                <a href="#" class="nav-item" id="navPermisos"><i class='bx bx-check-shield'></i> Permisos</a>
                <a href="#" class="nav-item" id="navSoporte"><i class='bx bx-help-circle'></i> Soporte</a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-danger" onclick="handleEndShift()" style="width: 100%; opacity: 0.8;">
                    <i class='bx bx-power-off'></i> Finalizar Turno
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <span style="background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;">TURNO POR ASIGNAR</span>
                    <span id="liveClock" style="margin-left: 20px; font-weight: 700; color: #3B82F6;">00:00:00</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="themeToggle"><i class='bx bx-moon'></i></button>
                    <button class="icon-btn"><i class='bx bx-bell'></i></button>
                    <div class="user-profile" style="display: flex; align-items: center; gap: 12px; margin-left: 20px; padding-left: 20px; border-left: 1px solid var(--glass-border);">
                        <div class="avatar-circle">AS</div>
                        <div class="user-details">
                            <span class="user-name" style="font-size: 14px; font-weight: 700;">...</span>
                            <span class="user-role" style="font-size: 11px; color: var(--text-secondary);">Gestor</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Workspace Section -->
            <div id="view-workspace" class="view-panel active-view">
                <div style="display: grid; grid-template-columns: 320px 1fr; gap: 25px; height: 100%;">
                    <div class="glass-panel" style="padding: 20px;">
                        <select id="activeSetSelect" class="form-select"></select>
                        <div class="tree-container" style="margin-top: 15px;"></div>
                    </div>
                    <div class="glass-panel" style="padding: 30px;">
                        <div id="taskDetail">Selecciona una tarea para comenzar...</div>
                    </div>
                </div>
            </div>

            <!-- Mi Turno Section -->
            <div id="view-turno" class="view-panel">
                <div class="glass-panel" style="padding: 25px;">
                    <select id="weekSelector" class="form-select" style="max-width: 300px;"></select>
                    <div style="overflow-x: auto; margin-top: 20px;">
                        <table class="schedule-table">
                            <tbody id="scheduleTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Permisos Section -->
            <div id="view-permisos" class="view-panel">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                    <div class="glass-panel" style="padding: 30px;">
                        <h3 style="margin-bottom: 20px;">Crear Nueva Solicitud</h3>
                        <input type="text" class="form-input" placeholder="Nombre del Gestor">
                        <select class="form-select"><option>Vacaciones</option><option>Día de la familia</option></select>
                        <input type="date" class="form-input">
                        <button class="btn btn-primary" style="width: 100%;">Enviar a Supervisor</button>
                    </div>
                    <div class="glass-panel" style="padding: 30px;">
                        <h3 style="margin-bottom: 20px;">Histórico de Permisos</h3>
                        <div id="historyList">Cargando histórico...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js?v=69"></script>
</body>
</html>
