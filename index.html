<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Manager | Estable</title>
    <link rel="stylesheet" href="styles.css?v=65">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="brand-name">Risk Manager</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navWorkspace"><i class='bx bx-grid-alt'></i> Mis Tareas</a>
                <a href="#" class="nav-item" id="navHorario"><i class='bx bx-calendar'></i> Horario</a>
                <a href="#" class="nav-item" id="navTeletrabajo"><i class='bx bx-home-alt'></i> Teletrabajo</a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-danger" onclick="handleEndShift()">Finalizar Turno</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div id="liveClock">00:00:00</div>
                <div class="user-profile">
                    <img src="" class="avatar">
                    <div class="user-details">
                        <span class="user-name">...</span>
                        <span class="user-role">...</span>
                    </div>
                </div>
            </header>

            <div id="view-workspace" class="view-panel">
                <div class="workspace-grid">
                    <div class="left-panel glass-panel">
                        <select id="activeSetSelect" class="form-select">
                            <option value="">Selecciona tu SET...</option>
                        </select>
                        <div class="tree-container"></div>
                    </div>
                    <div class="right-panel glass-panel">
                        <div id="taskDetail">Selecciona una tarea</div>
                    </div>
                </div>
            </div>

            <div id="view-horario" class="view-panel" style="display:none;">
                <div class="glass-panel" style="padding:20px;">
                    <select id="weekSelector" class="form-select"></select>
                    <table class="schedule-table">
                        <tbody id="scheduleTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-teletrabajo" class="view-panel" style="display:none;">
                <div class="glass-panel" style="padding:20px;">
                    <select id="teleWeekSelector" class="form-select"></select>
                    <table class="schedule-table">
                        <tbody id="teleTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js?v=65"></script>
</body>
</html>
